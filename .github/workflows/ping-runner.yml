name: Ping self-hosted

on:
  push:
    paths:
      - .github/workflows/ping-runner.yml
  workflow_dispatch:

jobs:
  ping:
    runs-on: [self-hosted, aegis-mt5]
    steps:
      - uses: actions/checkout@v4
      - name: Show runner info
        shell: cmd
        run: |
          echo USER=%USERNAME%
          echo COMPUTER=%COMPUTERNAME%
          ver
          whoami
