name: CI: Build SuhabFiboTrader

on:
  push:
    paths:
      - 'SuhabFiboTrade/**'

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Compile MQ5
        id: build
        run: |
          set -e
          METAEDITOR="C:/Program Files/MetaTrader 5/metaeditor64.exe"
          SOURCE="SuhabFiboTrade/SuhabFiboTrader_v5674.mq5"
          LOG="build_log.txt"

          if exist %LOG% del %LOG%
          "%METAEDITOR%" /compile:"%SOURCE%" /log:"%LOG%" || echo "compile failed" > %LOG%
          type %LOG%

          if findstr /C:"0 error(s), 0 warning(s)" %LOG% >nul; then
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "success=false" >> $GITHUB_OUTPUT
          fi

      - name: Save build log
        uses: actions/upload-artifact@v3
        with:
          name: build-report
          path: build_log.txt

      - name: Append error journal
        if: steps.build.outputs.success == 'false'
        run: |
          echo. >> SuhabFiboTrade/SuhabFiboTrader_v5674.mq5
          echo "// ЖУРНАЛ ОШИБОК" >> SuhabFiboTrade/SuhabFiboTrader_v5674.mq5
          type build_log.txt >> SuhabFiboTrade/SuhabFiboTrader_v5674.mq5

      - name: Commit error journal
        if: steps.build.outputs.success == 'false'
        run: |
          git config user.name "codex-bot"
          git config user.email "suhodolov333@gmail.com"
          git add SuhabFiboTrade/SuhabFiboTrader_v5674.mq5
          git commit -m "chore: append error log to SuhabFiboTrader_v5674.mq5"
          git push origin main
