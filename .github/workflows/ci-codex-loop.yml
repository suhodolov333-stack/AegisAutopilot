name: CI MetaEditor Build + Codex Smart Loop

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find build-config_Version2.json
        id: cfg
        shell: pwsh
        run: |
          $paths = @(
            "config/build-config_Version2.json",
            "MQL5/Experts/Aegis/config/build-config_Version2.json"
          )
          $cfgPath = $null
          foreach ($p in $paths) {
            if (Test-Path $p) { $cfgPath = $p; break }
          }
          if (-not $cfgPath) { Write-Error "Config not found in any known location"; exit 1 }
          Write-Host "Using config: $cfgPath"
          $cfg = Get-Content -Raw $cfgPath | ConvertFrom-Json
          "meta=$($cfg.MetaEditorPath)" | Out-File -Append -Encoding utf8 $env:GITHUB_OUTPUT
          "ea=$($cfg.EAPath)"          | Out-File -Append -Encoding utf8 $env:GITHUB_OUTPUT
          "repo=$($cfg.RepoPath)"      | Out-File -Append -Encoding utf8 $env:GITHUB_OUTPUT
          "bak=$($cfg.BackupDir)"      | Out-File -Append -Encoding utf8 $env:GITHUB_OUTPUT

      # Остальные шаги остаются как в твоём текущем workflow...
