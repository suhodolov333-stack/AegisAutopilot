name: CI MetaEditor Build + Codex Smart Loop

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read build-config_Version2.json
        shell: pwsh
        run: |
          $cfgPath = "${{ github.workspace }}/MQL5/Experts/Aegis/config/build-config_Version2.json"
          Write-Output "Using config file: $cfgPath"
          if (!(Test-Path $cfgPath)) {
            Write-Error "Config file not found: $cfgPath"
            exit 1
          }
          Get-Content $cfgPath | Out-File build-config.log -Encoding utf8

      - name: Compile Expert Advisor (MetaEditor)
        shell: pwsh
        run: |
          $cfgPath = "${{ github.workspace }}/MQL5/Experts/Aegis/config/build-config_Version2.json"
          $config = Get-Content $cfgPath | ConvertFrom-Json
          & "$($config.MetaEditorPath)" /compile:"$($config.EAPath)" /log
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Compilation failed"
            exit 1
          }

      - name: Backup EX5
        if: success()
        shell: pwsh
        run: |
          $cfgPath = "${{ github.workspace }}/MQL5/Experts/Aegis/config/build-config_Version2.json"
          $config = Get-Content $cfgPath | ConvertFrom-Json
          $backupDir = $config.BackupDir
          if (!(Test-Path $backupDir)) {
            New-Item -ItemType Directory -Path $backupDir | Out-Null
          }
          Copy-Item "$($config.EAPath -replace '.mq5$', '.ex5')" $backupDir -Force
          Write-Output "EX5 backup saved to $backupDir"

      - name: Autopush (results & tickets)
        run: |
          git config user.name "suhodolov333-stack"
          git config user.email "suhodolov333@gmail.com"
          git add .
          git commit -m "ci: autopush build results" || echo "No changes to commit"
          git push origin main || echo "Nothing to push"
