name: CI MetaEditor Build + Codex Smart Loop

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile Expert Advisor (MetaEditor)
        shell: cmd
        run: |
          "C:/Program Files/MetaTrader 5/metaeditor64.exe" /compile:"C:/Users/Administrator/AppData/Roaming/MetaQuotes/Terminal/D0E8209F77C8CF37AD8BF550E51FF075/MQL5/Experts/Aegis/SuhabFiboTrade/SuhabFiboTrader_v5674.mq5" /log

      - name: Backup EX5
        shell: cmd
        run: |
          mkdir "C:/Users/Administrator/AppData/Roaming/MetaQuotes/Terminal/D0E8209F77C8CF37AD8BF550E51FF075/MQL5/Experts/Aegis/config/backup" 2>nul
          copy /Y "C:/Users/Administrator/AppData/Roaming/MetaQuotes/Terminal/D0E8209F77C8CF37AD8BF550E51FF075/MQL5/Experts/Aegis/SuhabFiboTrade/SuhabFiboTrader_v5674.ex5" "C:/Users/Administrator/AppData/Roaming/MetaQuotes/Terminal/D0E8209F77C8CF37AD8BF550E51FF075/MQL5/Experts/Aegis/config/backup/SuhabFiboTrader_v5674.ex5" || echo ❌ EX5 не найден, копирование пропущено

      - name: Autopush (results & tickets)
        shell: cmd
        run: |
          git config user.name "suhodolov333-stack"
          git config user.email "suhodolov333@gmail.com"
          git add .
          git commit -m "ci: autopush build artifacts" || echo No changes to commit
          git push origin main
