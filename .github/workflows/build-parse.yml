name: CI Universal Workflow (MQL5 + Docs + Autopush)

on:
  push:
    branches: [ "main" ]

jobs:
  universal-job:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build MQL5 Experts with MetaEditor
        run: |
          if [ -f "C:/Program Files/MetaTrader 5/MetaEditor.exe" ]; then
            echo "➡️ Компиляция MQ5..."
            "C:/Program Files/MetaTrader 5/MetaEditor.exe" /compile:MQL5/Experts/Aegis/*.mq5 /log
          else
            echo "⚠️ MetaEditor.exe не найден — пропускаю сборку."
          fi

      - name: Universal autopush  # AEGIS_AUTO_PUSH_MARKER
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config user.name "aegis-bot"
          git config user.email "aegis-bot@users.noreply.github.com"
          git remote set-url origin https://${GH_TOKEN}@github.com/suhodolov333-stack/AegisAutopilot.git
          git fetch --all
          git add -A
          if git diff --cached --quiet; then
            echo "✅ Нет изменений для пуша."
          else
            git commit -m "ci: autopush (universal changes)"
            git push origin HEAD:${GITHUB_REF#refs/heads/}
          fi
