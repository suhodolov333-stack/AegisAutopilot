permissions:
  contents: write
name: Build Log Parse

on:
  push:
    branches: [ "main" ]
jobs:
  parse:
    runs-on: ubuntu-latest
    steps:
      - name: Parse build.log
        run: |
          python3 scripts/parse_build_log.py
      - name: Upload report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-report
          path: reports/build_report_latest.md


# --- Автопуш результата из runner'а (после всех шагов) ---
# AEGIS_AUTO_PUSH_MARKER
${INDENT}- name: Auto push back to repo
${INDENT}  if: always()
${INDENT}  env:
${INDENT}    GH_TOKEN: ${{ secrets.GH_TOKEN }}
${INDENT}  run: |
${INDENT}    git config user.name "aegis-bot"
${INDENT}    git config user.email "aegis-bot@users.noreply.github.com"
${INDENT}    # Уберём extraheader от actions/checkout, чтобы не мешал нашему токену
${INDENT}    git config --global --unset-all http.https://github.com/.extraheader || true
${INDENT}    git remote set-url origin https://${GH_TOKEN}@github.com/suhodolov333-stack/AegisAutopilot.git
${INDENT}    git fetch --all
${INDENT}    git add -A
${INDENT}    if git diff --cached --quiet; then
${INDENT}      echo "No changes to push"
${INDENT}    else
${INDENT}      git commit -m "ci: auto-push from runner"
${INDENT}      git push origin HEAD:${GITHUB_REF#refs/heads/}
${INDENT}    fi
