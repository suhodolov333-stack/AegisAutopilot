name: CI MetaEditor Build + Logs + Autopush

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Read config
        run: |
          RAW=$(tr -d '\r' < config/build-config_Version2.json)
          get() { printf '%s' "$RAW" | grep -Po "\"$1\"\\s*:\\s*\"\\K.*?(?=\")"; }
          echo "EDITOR_PATH=$(get MetaEditorPath | sed 's#\\\\\\\\#/#g')" >> $GITHUB_ENV
          echo "EA_FILE=$(get EAPath | sed 's#\\\\\\\\#/#g')" >> $GITHUB_ENV

      - name: Compile Expert Advisor
        run: |
          mkdir -p reports
          LOG="reports/build_$(date +%Y%m%d_%H%M%S).log"
          EDITOR_WIN=$(cygpath -w "$EDITOR_PATH")
          EA_WIN=$(cygpath -w "$EA_FILE")
          LOG_WIN=$(cygpath -w "$LOG")

          echo ">> Компиляция $EA_WIN" | tee -a "$LOG"
          "$EDITOR_WIN" /compile:"$EA_WIN" /log:"$LOG_WIN" || true
          echo "RC=$?" > reports/build_rc.txt

      - name: Autopush results
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config user.name  "aegis-bot"
          git config user.email "aegis-bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to push"
            exit 0
          fi
          git commit -m "ci: build logs + autopush"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${GITHUB_REF_NAME}"
