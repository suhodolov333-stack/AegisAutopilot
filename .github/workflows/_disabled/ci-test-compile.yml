name: CI MetaEditor Test (Suhab v5674)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    env:
      METAEDITOR: C:\Program Files\MetaTrader 5\metaeditor64.exe
      TERMINAL_MQL5: C:\Users\Administrator\AppData\Roaming\MetaQuotes\Terminal\D0E8209F77C8CF37AD8BF550E51FF075\MQL5
      REL_SRC: MQL5\Experts\Aegis\SuhabFiboTrade\SuhabFiboTrader_v5674.mq5
      REL_DIR: MQL5\Experts\Aegis\SuhabFiboTrade

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare & copy source into Terminal tree
        shell: cmd
        run: |
          if not exist "%TERMINAL_MQL5%\Experts\Aegis\SuhabFiboTrade" mkdir "%TERMINAL_MQL5%\Experts\Aegis\SuhabFiboTrade"
          copy /Y "%REL_SRC%" "%TERMINAL_MQL5%\Experts\Aegis\SuhabFiboTrade\"

      - name: Compile with MetaEditor (explicit log)
        shell: cmd
        run: |
          set LOG=%CD%\config\backup\SuhabFiboTrader_v5674.log
          if not exist "%CD%\config\backup" mkdir "%CD%\config\backup"
          "%METAEDITOR%" /compile:"%TERMINAL_MQL5%\Experts\Aegis\SuhabFiboTrade\SuhabFiboTrader_v5674.mq5" /log:"%LOG%"
          type "%LOG%" || echo "⚠ Лог не найден"

      - name: Backup EX5 if present
        shell: cmd
        run: |
          set EX5=%TERMINAL_MQL5%\Experts\Aegis\SuhabFiboTrade\SuhabFiboTrader_v5674.ex5
          if exist "%EX5%" (
            copy /Y "%EX5%" "%CD%\config\backup\"
            echo "EX5 скопирован в config\\backup"
          ) else (
            echo "⚠ EX5 не найден"
          )

      - name: Autopush (logs & results)
        if: always()
        shell: cmd
        run: |
          git config user.name "suhodolov333-stack"
          git add -A
          git diff --cached --quiet && echo "Нет изменений для коммита" || (git commit -m "ci(test): Suhab v5674 compile + logs" & git push origin ${{ github.ref_name }})
