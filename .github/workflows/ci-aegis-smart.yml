name: CI Aegis — Smart Codex Loop (full, grouped logs)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  codex:
    runs-on: self-hosted
    timeout-minutes: 55
    env:
      ENVFILE: config\build-config_Version2.env
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Load .env variables to job
        shell: cmd
        run: |
          for /f "usebackq tokens=1,* delims==" %%A in ("%ENVFILE%") do (
            set "k=%%A"
            set "v=%%B"
            if not "!k!"=="" if not "!k:~0,1!"=="#" if not "!k:~0,1!"==";" (
              echo !k!=!v!>> %GITHUB_ENV%
            )
          )

      - name: ::group::Sanity print
        shell: cmd
        run: |
          echo METAEDITOR=%METAEDITOR%
          echo MQL5_DIR=%MQL5_DIR%
          echo EA_REPO=%EA_REPO%
          echo EA_TERM=%EA_TERM%
          echo ::endgroup::

      - name: ::group::Ensure folders & sync repo -> terminal
        shell: cmd
        run: |
          if not exist "%MQL5_DIR%\Experts\Aegis\SuhabFiboTrade" mkdir "%MQL5_DIR%\Experts\Aegis\SuhabFiboTrade"
          robocopy "%GITHUB_WORKSPACE%\MQL5" "%MQL5_DIR%" /E /MT:8 /R:1 /W:1 /NFL /NDL /NJH /NJS /NP
          set RC=%ERRORLEVEL%
          if %RC% GEQ 8 ( echo Robocopy failed %RC% & exit /b %RC% )
          echo ::endgroup::

      - name: ::group::Run Smart Codex Loop
        shell: cmd
        run: |
          scripts\compile-ea.cmd "%ENVFILE%"
          echo ::endgroup::

      - name: Upload artifacts (logs/state/hints/versions)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codex-smart-logs
          path: |
            codex/build/*
            codex/history/*
            codex/state/*
            codex/inbox/*

      - name: Autopush (results & tickets)
        if: always()
        shell: cmd
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "suhodolov333-stack"
          git config user.email "suhodolov333-stack@users.noreply.github.com"
          if not "%GH_TOKEN%"=="" (
            git remote set-url origin https://x-access-token:%GH_TOKEN%@github.com/${{ github.repository }}.git
          ) else if not "%GITHUB_TOKEN%"=="" (
            git remote set-url origin https://x-access-token:%GITHUB_TOKEN%@github.com/${{ github.repository }}.git
          )
          git add -A
          git diff --cached --quiet && echo "No changes" || git commit -m "ci: Smart Codex Loop (full) => ${{ job.status }}"
          git push origin "HEAD:${{ github.ref_name }}"
