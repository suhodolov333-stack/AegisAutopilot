name: CI Mini Compile Loop

on:
  push:
    branches: [ main ]

jobs:
  compile:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Try compile EA with retries
        shell: cmd
        run: |
          echo === Start Compile Loop ===
          set EA_FILE=C:\Users\Administrator\AppData\Roaming\MetaQuotes\Terminal\D0E8209F77C8CF37AD8BF550E51FF075\MQL5\Experts\Aegis\SuhabFiboTrader_v5674.mq5
          set METAEDITOR="C:\Program Files\MetaTrader 5\metaeditor64.exe"
          set LOGFILE=${{ github.workspace }}\compile.log

          del "%LOGFILE%" 2>nul

          for /l %%i in (1,1,3) do (
            echo --- Attempt %%i ---
            "%METAEDITOR%" /compile:"%EA_FILE%" /log:"%LOGFILE%"
            if exist "%EA_FILE:.mq5=.ex5%" (
              echo SUCCESS on attempt %%i >> "%LOGFILE%"
              exit /b 0
            )
            echo Failed attempt %%i, retrying... >> "%LOGFILE%"
          )

          echo FAILED after 3 attempts >> "%LOGFILE%"
          exit /b 1

      - name: Upload compile log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compile-log
          path: ${{ github.workspace }}\compile.log
